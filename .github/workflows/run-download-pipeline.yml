name: Run Download Pipeline

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Optional max number of NEW documents to download (leave blank for no limit)'
        required: false
        default: ''
        type: string
      sleep_seconds:
        description: 'Optional seconds to sleep between downloads'
        required: false
        default: '0.5'
        type: string

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install Python dependencies
        run: uv sync

      - name: Ensure output directories exist
        run: |
          mkdir -p Downloads

      - name: Run ingestion workflow
        run: |
          LIMIT_ARG=""
          if [ -n "${{ inputs.limit }}" ]; then
            LIMIT_ARG="--limit ${{ inputs.limit }}"
          fi

          uv run python ingestion/run.py \
            ${LIMIT_ARG} \
            --sleep "${{ inputs.sleep_seconds }}"

      - name: Commit and push pipeline outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ingestion/data/downloaded_files_database.csv \
                  ingestion/data/parquet_files/*.parquet \
                  ingestion/data/document_info.csv \
                  ingestion/data/facility_information.csv || true

          if git diff --cached --quiet; then
            echo "No pipeline output changes to commit."
            exit 0
          fi

          git commit -m "Update download database and parsed outputs"
          git push origin "HEAD:${GITHUB_REF_NAME}"
