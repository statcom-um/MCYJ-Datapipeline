name: Check Unique SHA256 Hashes

on:
  pull_request:
    branches:
      - main
    paths:
      - 'ingestion/data/parquet_files/*.parquet'
      - 'ingestion/scripts/check_unique_hashes.py'
      - '.github/workflows/check-unique-hashes.yml'

jobs:
  check-hashes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install Python dependencies
        run: uv sync

      - name: Check for duplicate SHA256 hashes
        run: |
          uv run python ingestion/scripts/check_unique_hashes.py

      - name: Report success
        if: success()
        run: |
          echo "✅ All SHA256 hashes across parquet files are unique!"
