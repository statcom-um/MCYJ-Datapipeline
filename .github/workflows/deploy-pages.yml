name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install Python dependencies
        run: uv sync

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'website/package-lock.json'

      - name: Install Node.js dependencies
        run: |
          cd website
          npm ci

      - name: Generate website data
        run: |
          cd website
          uv run python generate_website_data.py \
            --document-csv ../ingestion/data/document_info.csv \
            --sir-summaries-csv ../llm_analysis/data/sir_summaries.csv \
            --sir-violation-levels-csv ../llm_analysis/data/sir_violation_levels.csv \
            --keyword-reduction-csv ../llm_analysis/data/violation_curation_keyword_reduction.csv \
            --facility-info-csv ../ingestion/data/facility_information.csv \
            --staffing-summaries-csv ../llm_analysis/data/staffing_summaries.csv \
            --output-dir public/data

      - name: Export parquet documents to JSON
        run: |
          cd website
          uv run python export_parquet_to_json.py \
            --parquet-dir ../ingestion/data/parquet_files \
            --output-dir public/documents \
            --document-csv ../ingestion/data/document_info.csv \
            --sir-summaries-csv ../llm_analysis/data/sir_summaries.csv \
            --sir-violation-levels-csv ../llm_analysis/data/sir_violation_levels.csv \
            --keyword-reduction-csv ../llm_analysis/data/violation_curation_keyword_reduction.csv \
            --staffing-summaries-csv ../llm_analysis/data/staffing_summaries.csv

      - name: Build website
        run: |
          cd website
          npm run build
        env:
          VITE_BASE_URL: /MCYJ-Datapipeline/
          VITE_COMMIT_HASH: ${{ github.sha }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
