name: Run LLM

on:
  workflow_dispatch:
    inputs:
      max_docs:
        description: 'Maximum number of documents to process per LLM step'
        required: false
        default: '100'
        type: number

permissions:
  contents: write

jobs:
  run-llm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: '**/pyproject.toml'

      - name: Install Python dependencies
        run: uv sync

      - name: Run update_sir_summaries.py
        run: uv run python llm_analysis/update_sir_summaries.py --count ${{ inputs.max_docs }}
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}

      - name: Run update_violation_levels.py
        run: uv run python llm_analysis/update_violation_levels.py --max-count ${{ inputs.max_docs }}
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}

      - name: Run update_staffing_summaries.py
        run: uv run python llm_analysis/update_staffing_summaries.py --max-count ${{ inputs.max_docs }}
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}

      - name: Commit and push LLM outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add llm_analysis/sir_summaries.csv \
                  llm_analysis/sir_violation_levels.csv \
                  llm_analysis/staffing_summaries.csv || true

          if git diff --cached --quiet; then
            echo "No LLM output changes to commit."
            exit 0
          fi

          git commit -m "Update SIR summaries, violation levels, and staffing summaries"
          git push origin "HEAD:${GITHUB_REF_NAME}"
